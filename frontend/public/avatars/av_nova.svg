<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Cartoon NOVA - cosmic purple/pink female superhero -->
  <defs>
    <radialGradient id="nova_bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e0a3c"/>
    </radialGradient>
  </defs>

  <circle cx="100" cy="100" r="100" fill="url(#nova_bg)"/>
  <!-- Star/cosmic sparkles bg -->
  <circle cx="20" cy="30" r="2" fill="white" opacity="0.6"/>
  <circle cx="50" cy="15" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="160" cy="25" r="2" fill="white" opacity="0.6"/>
  <circle cx="180" cy="55" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="170" cy="160" r="2" fill="white" opacity="0.5"/>
  <circle cx="30" cy="170" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="15" cy="90" r="1" fill="white" opacity="0.5"/>
  <circle cx="185" cy="100" r="1" fill="white" opacity="0.5"/>
  <!-- Star cross sparkles -->
  <path d="M35 50 L37 44 L39 50 L45 52 L39 54 L37 60 L35 54 L29 52Z" fill="#e879f9" opacity="0.5"/>
  <path d="M158 140 L160 134 L162 140 L168 142 L162 144 L160 150 L158 144 L152 142Z" fill="#a78bfa" opacity="0.4"/>

  <!-- Cape / flowing energy trails -->
  <path d="M65 128 Q38 158 42 210 L100 194 L158 210 Q162 158 135 128 Q118 144 100 147 Q82 144 65 128Z" fill="#7c3aed" stroke="#111" stroke-width="3"/>
  <path d="M72 134 Q52 162 54 202 L100 190 L146 202 Q148 162 128 134 Q114 148 100 151 Q86 148 72 134Z" fill="#6d28d9"/>
  <!-- Cosmic swirls on cape -->
  <path d="M80 155 Q90 148 100 152 Q110 148 120 155" stroke="#e879f9" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M78 165 Q90 158 100 162 Q110 158 122 165" stroke="#c084fc" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Body / suit -->
  <path d="M65 210 L68 148 Q78 128 100 122 Q122 128 132 148 L135 210Z" fill="#7c3aed" stroke="#111" stroke-width="3"/>
  <!-- Chest star emblem -->
  <path d="M100 130 L103 140 L114 140 L106 147 L109 158 L100 151 L91 158 L94 147 L86 140 L97 140Z" fill="#e879f9" stroke="#111" stroke-width="1.5"/>
  <!-- Belt with gem -->
  <rect x="72" y="157" width="56" height="9" rx="3" fill="#a855f7" stroke="#111" stroke-width="2"/>
  <ellipse cx="100" cy="161" rx="7" ry="5" fill="#e879f9" stroke="#111" stroke-width="1.5"/>

  <!-- Arms with energy aura -->
  <path d="M68 148 Q50 140 42 126 Q38 112 46 106 Q56 110 62 126Z" fill="#7c3aed" stroke="#111" stroke-width="3"/>
  <path d="M132 148 Q150 140 158 126 Q162 112 154 106 Q144 110 138 126Z" fill="#7c3aed" stroke="#111" stroke-width="3"/>
  <!-- Hands with energy glow -->
  <ellipse cx="44" cy="106" rx="13" ry="11" fill="#c4b5fd" stroke="#111" stroke-width="2.5"/>
  <ellipse cx="156" cy="106" rx="13" ry="11" fill="#c4b5fd" stroke="#111" stroke-width="2.5"/>
  <!-- Energy from hands -->
  <circle cx="30" cy="98" r="8" fill="#e879f9" stroke="#111" stroke-width="2" opacity="0.7"/>
  <circle cx="170" cy="98" r="8" fill="#e879f9" stroke="#111" stroke-width="2" opacity="0.7"/>
  <circle cx="30" cy="98" r="4" fill="white" opacity="0.8"/>
  <circle cx="170" cy="98" r="4" fill="white" opacity="0.8"/>

  <!-- Neck -->
  <rect x="88" y="94" width="24" height="30" rx="6" fill="#ddd6fe" stroke="#111" stroke-width="2.5"/>

  <!-- HEAD -->
  <ellipse cx="100" cy="66" rx="34" ry="32" fill="#ddd6fe" stroke="#111" stroke-width="3.5"/>

  <!-- Mask/visor - sleek half-face -->
  <path d="M66 60 Q68 40 100 36 Q132 40 134 60 Q120 52 100 50 Q80 52 66 60Z" fill="#7c3aed" stroke="#111" stroke-width="3"/>
  <!-- Visor glow band -->
  <rect x="70" y="57" width="60" height="12" rx="5" fill="#4c1d95" stroke="#111" stroke-width="2"/>
  <!-- Eyes through visor - glowing cosmic -->
  <ellipse cx="86" cy="63" rx="9" ry="5" fill="#e879f9" stroke="#111" stroke-width="1"/>
  <ellipse cx="114" cy="63" rx="9" ry="5" fill="#e879f9" stroke="#111" stroke-width="1"/>
  <circle cx="86" cy="63" r="3" fill="white"/>
  <circle cx="114" cy="63" r="3" fill="white"/>
  <circle cx="85" cy="62" r="1" fill="#e879f9"/>
  <circle cx="113" cy="62" r="1" fill="#e879f9"/>

  <!-- Nose delicate -->
  <path d="M97 74 Q100 78 103 74" stroke="#9f7aea" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Confident smile -->
  <path d="M86 80 Q100 90 114 80" stroke="#111" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Lips -->
  <path d="M90 82 Q100 87 110 82 Q106 85 100 86 Q94 85 90 82Z" fill="#c084fc"/>

  <!-- Long flowing hair - cosmic with streaks -->
  <path d="M66 58 Q48 80 42 110 Q52 90 66 75Z" fill="#4c1d95" stroke="#111" stroke-width="2.5"/>
  <path d="M134 58 Q152 80 158 110 Q148 90 134 75Z" fill="#4c1d95" stroke="#111" stroke-width="2.5"/>
  <!-- Hair gloss streak left -->
  <path d="M56 70 Q52 90 50 110" stroke="#7c3aed" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M148 70 Q152 90 150 110" stroke="#7c3aed" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Crown/tiara -->
  <path d="M72 44 L76 34 L82 44 L88 32 L94 44 L100 30 L106 44 L112 32 L118 44 L124 34 L128 44Z" fill="#e879f9" stroke="#111" stroke-width="2"/>
  <!-- Crown gems -->
  <circle cx="100" cy="30" r="5" fill="#f0abfc" stroke="#111" stroke-width="1.5"/>
  <circle cx="82" cy="34" r="3" fill="#c084fc" stroke="#111" stroke-width="1"/>
  <circle cx="118" cy="34" r="3" fill="#c084fc" stroke="#111" stroke-width="1"/>

  <!-- Name plate -->
  <rect x="32" y="170" width="136" height="24" rx="6" fill="#111" opacity="0.88"/>
  <text x="100" y="187" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#e879f9" text-anchor="middle" letter-spacing="3">NOVA</text>

  <circle cx="100" cy="100" r="97" fill="none" stroke="#111" stroke-width="5"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#a855f7" stroke-width="2"/>
</svg>
