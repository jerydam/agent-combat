<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Cartoon BLUE RANGER - sentai style -->
  <defs>
    <radialGradient id="br_bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <linearGradient id="br_visor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="100" fill="url(#br_bg)"/>
  <line x1="100" y1="100" x2="5" y2="40" stroke="#3b82f6" stroke-width="3" opacity="0.25"/>
  <line x1="100" y1="100" x2="195" y2="35" stroke="#3b82f6" stroke-width="2" opacity="0.2"/>
  <line x1="100" y1="100" x2="5" y2="160" stroke="#1d4ed8" stroke-width="2" opacity="0.2"/>
  <line x1="100" y1="100" x2="195" y2="165" stroke="#1d4ed8" stroke-width="2" opacity="0.2"/>

  <!-- Body suit -->
  <path d="M55 210 L60 148 Q70 126 100 120 Q130 126 140 148 L145 210Z" fill="#2563eb" stroke="#111" stroke-width="3.5"/>
  <!-- White chest diamond -->
  <path d="M100 124 L118 140 L100 156 L82 140Z" fill="white" stroke="#111" stroke-width="2.5"/>
  <path d="M100 128 L114 140 L100 152 L86 140Z" fill="#2563eb"/>

  <!-- Lightning bolt on chest diamond -->
  <path d="M104 130 L98 140 L103 140 L97 152 L108 138 L102 138 L108 130Z" fill="#fbbf24" stroke="#111" stroke-width="1.5"/>

  <!-- Belt -->
  <rect x="68" y="156" width="64" height="12" rx="3" fill="white" stroke="#111" stroke-width="2.5"/>
  <rect x="90" y="153" width="20" height="18" rx="3" fill="#2563eb" stroke="#111" stroke-width="2"/>
  <rect x="94" y="156" width="12" height="12" rx="2" fill="#fbbf24" stroke="#111" stroke-width="1.5"/>

  <!-- Arms -->
  <path d="M60 148 Q42 140 34 126 Q30 112 38 106 Q50 110 56 126Z" fill="#2563eb" stroke="#111" stroke-width="3"/>
  <path d="M52 130 Q44 128 40 122" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M140 148 Q158 140 166 126 Q170 112 162 106 Q150 110 144 126Z" fill="#2563eb" stroke="#111" stroke-width="3"/>
  <path d="M148 130 Q156 128 160 122" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Gloves -->
  <ellipse cx="36" cy="106" rx="14" ry="11" fill="white" stroke="#111" stroke-width="2.5"/>
  <ellipse cx="164" cy="106" rx="14" ry="11" fill="white" stroke="#111" stroke-width="2.5"/>
  <line x1="24" y1="103" x2="48" y2="103" stroke="#bbb" stroke-width="1.5"/>
  <line x1="24" y1="107" x2="48" y2="107" stroke="#bbb" stroke-width="1"/>
  <line x1="152" y1="103" x2="176" y2="103" stroke="#bbb" stroke-width="1.5"/>
  <line x1="152" y1="107" x2="176" y2="107" stroke="#bbb" stroke-width="1"/>

  <!-- Collar -->
  <path d="M76 118 Q78 110 100 108 Q122 110 124 118 Q114 114 100 113 Q86 114 76 118Z" fill="white" stroke="#111" stroke-width="2"/>

  <!-- HELMET -->
  <ellipse cx="100" cy="68" rx="40" ry="42" fill="#2563eb" stroke="#111" stroke-width="4"/>
  <path d="M60 78 Q58 98 64 110 Q76 122 100 124 Q124 122 136 110 Q142 98 140 78Z" fill="#2563eb" stroke="#111" stroke-width="3.5"/>
  <path d="M68 104 Q80 118 100 120 Q120 118 132 104 Q120 112 100 114 Q80 112 68 104Z" fill="#1d4ed8"/>

  <!-- Visor -->
  <path d="M64 68 Q66 55 82 52 L100 50 L118 52 Q134 55 136 68 Q128 62 100 60 Q72 62 64 68Z" fill="#111" stroke="#111" stroke-width="2"/>
  <path d="M66 70 Q68 58 84 56 L100 54 L116 56 Q132 58 134 70 Q128 64 100 62 Q72 64 66 70Z" fill="url(#br_visor)" stroke="#111" stroke-width="2"/>
  <path d="M72 64 Q86 60 100 60 Q114 60 128 64" stroke="white" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>

  <!-- Top fin - lightning bolt shape -->
  <path d="M104 28 L96 18 L88 28 L96 24 L94 40 L102 28 L110 32 L104 28Z" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Crest ridge -->
  <rect x="97" y="70" width="6" height="30" rx="2" fill="white" stroke="#111" stroke-width="1.5"/>

  <!-- Side details -->
  <path d="M60 78 L50 70 L58 85Z" fill="#1d4ed8" stroke="#111" stroke-width="2"/>
  <path d="M140 78 L150 70 L142 85Z" fill="#1d4ed8" stroke="#111" stroke-width="2"/>
  <line x1="52" y1="74" x2="60" y2="80" stroke="#111" stroke-width="2"/>
  <line x1="52" y1="78" x2="60" y2="84" stroke="#111" stroke-width="2"/>
  <line x1="148" y1="74" x2="140" y2="80" stroke="#111" stroke-width="2"/>
  <line x1="148" y1="78" x2="140" y2="84" stroke="#111" stroke-width="2"/>

  <!-- Name plate -->
  <rect x="18" y="170" width="164" height="24" rx="6" fill="#111" opacity="0.9"/>
  <text x="100" y="187" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#60a5fa" text-anchor="middle" letter-spacing="1">BLUE RANGER</text>

  <circle cx="100" cy="100" r="97" fill="none" stroke="#111" stroke-width="5"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#fbbf24" stroke-width="2"/>
</svg>
