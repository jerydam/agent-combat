<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Cartoon GOLD RANGER - elite sentai, gold/black -->
  <defs>
    <radialGradient id="gr_bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </radialGradient>
    <linearGradient id="gr_gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gr_visor_gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="100" fill="url(#gr_bg)"/>
  <!-- Gold shimmer lines -->
  <line x1="100" y1="100" x2="5" y2="45" stroke="#f59e0b" stroke-width="3" opacity="0.3"/>
  <line x1="100" y1="100" x2="195" y2="40" stroke="#fbbf24" stroke-width="2" opacity="0.25"/>
  <line x1="100" y1="100" x2="8" y2="155" stroke="#f59e0b" stroke-width="2" opacity="0.2"/>
  <line x1="100" y1="100" x2="192" y2="160" stroke="#fbbf24" stroke-width="2" opacity="0.2"/>
  <line x1="100" y1="100" x2="100" y2="5" stroke="#fbbf24" stroke-width="2" opacity="0.2"/>

  <!-- Black suit body -->
  <path d="M55 210 L60 148 Q70 126 100 120 Q130 126 140 148 L145 210Z" fill="#1c1917" stroke="#111" stroke-width="3.5"/>
  <!-- Gold chest armor plate -->
  <path d="M78 128 Q100 120 122 128 L118 155 L100 160 L82 155Z" fill="url(#gr_gold)" stroke="#111" stroke-width="2.5"/>
  <path d="M84 132 Q100 125 116 132 L114 152 L100 156 L86 152Z" fill="#d97706"/>
  <!-- Chest emblem - diamond -->
  <path d="M100 130 L108 140 L100 150 L92 140Z" fill="#111" stroke="#f59e0b" stroke-width="2"/>

  <!-- Gold belt -->
  <rect x="68" y="158" width="64" height="12" rx="3" fill="url(#gr_gold)" stroke="#111" stroke-width="2.5"/>
  <!-- Belt buckle -->
  <rect x="88" y="155" width="24" height="18" rx="3" fill="#111" stroke="#f59e0b" stroke-width="2"/>
  <path d="M100 159 L104 166 L100 173 L96 166Z" fill="#f59e0b"/>

  <!-- Arms black with gold trim -->
  <path d="M60 148 Q42 140 34 126 Q30 112 38 106 Q50 110 56 126Z" fill="#1c1917" stroke="#111" stroke-width="3"/>
  <!-- Gold arm stripe -->
  <path d="M56 138 Q46 134 40 126 Q42 132 50 138Z" fill="url(#gr_gold)" stroke="#111" stroke-width="1.5"/>
  <path d="M140 148 Q158 140 166 126 Q170 112 162 106 Q150 110 144 126Z" fill="#1c1917" stroke="#111" stroke-width="3"/>
  <path d="M144 138 Q154 134 160 126 Q158 132 150 138Z" fill="url(#gr_gold)" stroke="#111" stroke-width="1.5"/>

  <!-- Gold gloves -->
  <ellipse cx="36" cy="106" rx="14" ry="11" fill="url(#gr_gold)" stroke="#111" stroke-width="2.5"/>
  <ellipse cx="164" cy="106" rx="14" ry="11" fill="url(#gr_gold)" stroke="#111" stroke-width="2.5"/>
  <line x1="24" y1="103" x2="48" y2="103" stroke="#b45309" stroke-width="1.5"/>
  <line x1="24" y1="107" x2="48" y2="107" stroke="#b45309" stroke-width="1"/>
  <line x1="152" y1="103" x2="176" y2="103" stroke="#b45309" stroke-width="1.5"/>
  <line x1="152" y1="107" x2="176" y2="107" stroke="#b45309" stroke-width="1"/>

  <!-- Gold collar -->
  <path d="M76 118 Q78 110 100 108 Q122 110 124 118 Q114 114 100 113 Q86 114 76 118Z" fill="url(#gr_gold)" stroke="#111" stroke-width="2"/>

  <!-- ═══ GOLD HELMET ═══ -->
  <ellipse cx="100" cy="68" rx="40" ry="42" fill="#1c1917" stroke="#111" stroke-width="4"/>
  <path d="M60 78 Q58 98 64 110 Q76 122 100 124 Q124 122 136 110 Q142 98 140 78Z" fill="#1c1917" stroke="#111" stroke-width="3.5"/>
  <!-- Gold helmet side plates -->
  <path d="M60 68 Q62 52 78 46 L100 44 L122 46 Q138 52 140 68 Q124 58 100 56 Q76 58 60 68Z" fill="url(#gr_gold)" stroke="#111" stroke-width="2.5"/>
  <!-- Black trim band -->
  <path d="M64 68 Q68 58 84 56 L100 54 L116 56 Q132 58 136 68 Q120 64 100 62 Q80 64 64 68Z" fill="#1c1917"/>

  <!-- Visor - tall and angular golden -->
  <path d="M66 70 Q70 56 86 53 L100 51 L114 53 Q130 56 134 70 Q124 62 100 60 Q76 62 66 70Z" fill="url(#gr_visor_gold)" stroke="#111" stroke-width="2"/>
  <!-- Visor shine -->
  <path d="M72 63 Q86 58 100 58 Q114 58 128 63" stroke="#fde68a" stroke-width="2.5" fill="none" opacity="0.7" stroke-linecap="round"/>

  <!-- Center ridge line (black) -->
  <rect x="97" y="54" width="6" height="35" rx="2" fill="#111" stroke="#f59e0b" stroke-width="1"/>

  <!-- Tall crown crest - angular/samurai style -->
  <path d="M90 28 L96 14 L100 8 L104 14 L110 28 L106 22 L100 12 L94 22Z" fill="url(#gr_gold)" stroke="#111" stroke-width="2.5"/>
  <!-- Crown jewel -->
  <ellipse cx="100" cy="10" rx="5" ry="4" fill="#fde68a" stroke="#111" stroke-width="1.5"/>

  <!-- Side fins angular -->
  <path d="M60 70 L46 62 L54 80Z" fill="url(#gr_gold)" stroke="#111" stroke-width="2"/>
  <path d="M140 70 L154 62 L146 80Z" fill="url(#gr_gold)" stroke="#111" stroke-width="2"/>
  <!-- Vent lines on sides -->
  <line x1="52" y1="68" x2="60" y2="74" stroke="#111" stroke-width="2"/>
  <line x1="52" y1="72" x2="60" y2="78" stroke="#111" stroke-width="2"/>
  <line x1="148" y1="68" x2="140" y2="74" stroke="#111" stroke-width="2"/>
  <line x1="148" y1="72" x2="140" y2="78" stroke="#111" stroke-width="2"/>

  <!-- Chin guard gold -->
  <path d="M72 104 Q80 116 100 118 Q120 116 128 104 Q116 112 100 114 Q84 112 72 104Z" fill="url(#gr_gold)" stroke="#111" stroke-width="2"/>

  <!-- Name plate -->
  <rect x="18" y="170" width="164" height="24" rx="6" fill="#111" opacity="0.92"/>
  <text x="100" y="187" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#fbbf24" text-anchor="middle" letter-spacing="1">GOLD RANGER</text>

  <circle cx="100" cy="100" r="97" fill="none" stroke="#111" stroke-width="5"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
</svg>
