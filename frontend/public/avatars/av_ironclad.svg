<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="ic_bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </radialGradient>
    <linearGradient id="ic_steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="40%" stop-color="#d1d5db"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </linearGradient>
    <linearGradient id="ic_dark_steel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4b5563"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="ic_accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="ic_bevel">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feOffset dx="1" dy="1" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
    <filter id="ic_glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="ic_circle">
      <circle cx="100" cy="100" r="98"/>
    </clipPath>
  </defs>

  <circle cx="100" cy="100" r="100" fill="url(#ic_bg)"/>

  <g clip-path="url(#ic_circle)">
    <!-- Body - massive armored torso -->
    <rect x="55" y="118" width="90" height="95" rx="5" fill="url(#ic_dark_steel)"/>
    <!-- Chest plate center -->
    <rect x="70" y="118" width="60" height="55" rx="3" fill="#374151"/>
    <!-- Chest plate top bevel -->
    <rect x="70" y="118" width="60" height="4" rx="1" fill="#9ca3af" opacity="0.6"/>
    <!-- Chest rivet lines -->
    <line x1="100" y1="122" x2="100" y2="170" stroke="#1f2937" stroke-width="1.5"/>
    <line x1="70" y1="140" x2="130" y2="140" stroke="#1f2937" stroke-width="1.5"/>
    <!-- Rivets -->
    <circle cx="74" cy="122" r="2" fill="#6b7280"/>
    <circle cx="126" cy="122" r="2" fill="#6b7280"/>
    <circle cx="74" cy="168" r="2" fill="#6b7280"/>
    <circle cx="126" cy="168" r="2" fill="#6b7280"/>
    <circle cx="74" cy="140" r="2" fill="#6b7280"/>
    <circle cx="126" cy="140" r="2" fill="#6b7280"/>
    <circle cx="100" cy="122" r="2" fill="#6b7280"/>
    <circle cx="100" cy="140" r="2" fill="#6b7280"/>
    <circle cx="100" cy="168" r="2" fill="#6b7280"/>

    <!-- Glowing power core in center chest -->
    <circle cx="100" cy="155" r="10" fill="#1f2937"/>
    <circle cx="100" cy="155" r="8" fill="#f59e0b" opacity="0.15" filter="url(#ic_glow)"/>
    <circle cx="100" cy="155" r="5" fill="#f59e0b" opacity="0.4" filter="url(#ic_glow)"/>
    <circle cx="100" cy="155" r="3" fill="#fbbf24" filter="url(#ic_glow)"/>
    <circle cx="100" cy="155" r="1.5" fill="#fef3c7"/>

    <!-- Massive pauldrons (shoulder guards) -->
    <ellipse cx="55" cy="128" rx="22" ry="18" fill="#374151"/>
    <ellipse cx="55" cy="126" rx="20" ry="15" fill="#4b5563"/>
    <!-- Shoulder top highlight -->
    <ellipse cx="55" cy="120" rx="18" ry="6" fill="#9ca3af" opacity="0.4"/>
    <!-- Shoulder rivets -->
    <circle cx="42" cy="130" r="2" fill="#6b7280"/>
    <circle cx="68" cy="130" r="2" fill="#6b7280"/>
    <circle cx="55" cy="140" r="2" fill="#6b7280"/>

    <ellipse cx="145" cy="128" rx="22" ry="18" fill="#374151"/>
    <ellipse cx="145" cy="126" rx="20" ry="15" fill="#4b5563"/>
    <ellipse cx="145" cy="120" rx="18" ry="6" fill="#9ca3af" opacity="0.4"/>
    <circle cx="132" cy="130" r="2" fill="#6b7280"/>
    <circle cx="158" cy="130" r="2" fill="#6b7280"/>
    <circle cx="145" cy="140" r="2" fill="#6b7280"/>

    <!-- Upper arms - gauntlets -->
    <rect x="33" y="130" width="22" height="30" rx="6" fill="#374151"/>
    <rect x="35" y="132" width="18" height="26" rx="5" fill="#4b5563"/>
    <line x1="44" y1="134" x2="44" y2="156" stroke="#1f2937" stroke-width="1"/>
    <rect x="145" y="130" width="22" height="30" rx="6" fill="#374151"/>
    <rect x="147" y="132" width="18" height="26" rx="5" fill="#4b5563"/>
    <line x1="156" y1="134" x2="156" y2="156" stroke="#1f2937" stroke-width="1"/>

    <!-- Neck plate -->
    <rect x="86" y="95" width="28" height="24" rx="4" fill="#374151"/>
    <rect x="88" y="97" width="24" height="20" rx="3" fill="#4b5563"/>
    <!-- Neck bolts -->
    <circle cx="90" cy="100" r="1.5" fill="#9ca3af"/>
    <circle cx="110" cy="100" r="1.5" fill="#9ca3af"/>
    <circle cx="90" cy="112" r="1.5" fill="#9ca3af"/>
    <circle cx="110" cy="112" r="1.5" fill="#9ca3af"/>

    <!-- Head - full combat helmet -->
    <ellipse cx="100" cy="65" rx="34" ry="32" fill="#374151"/>
    <ellipse cx="100" cy="64" rx="31" ry="29" fill="#4b5563"/>
    <!-- Top highlight dome -->
    <ellipse cx="100" cy="52" rx="28" ry="10" fill="#9ca3af" opacity="0.3"/>

    <!-- Helmet forehead ridge -->
    <rect x="76" y="48" width="48" height="8" rx="2" fill="#374151"/>
    <rect x="76" y="48" width="48" height="2" rx="1" fill="#9ca3af" opacity="0.5"/>

    <!-- Helmet side vents -->
    <rect x="66" y="60" width="8" height="20" rx="2" fill="#1f2937"/>
    <line x1="67" y1="64" x2="73" y2="64" stroke="#374151" stroke-width="1"/>
    <line x1="67" y1="68" x2="73" y2="68" stroke="#374151" stroke-width="1"/>
    <line x1="67" y1="72" x2="73" y2="72" stroke="#374151" stroke-width="1"/>
    <line x1="67" y1="76" x2="73" y2="76" stroke="#374151" stroke-width="1"/>
    <rect x="126" y="60" width="8" height="20" rx="2" fill="#1f2937"/>
    <line x1="127" y1="64" x2="133" y2="64" stroke="#374151" stroke-width="1"/>
    <line x1="127" y1="68" x2="133" y2="68" stroke="#374151" stroke-width="1"/>
    <line x1="127" y1="72" x2="133" y2="72" stroke="#374151" stroke-width="1"/>
    <line x1="127" y1="76" x2="133" y2="76" stroke="#374151" stroke-width="1"/>

    <!-- Visor slit -->
    <rect x="76" y="60" width="48" height="14" rx="3" fill="#0a0a0b"/>
    <rect x="78" y="62" width="44" height="10" rx="2" fill="#111827"/>
    <!-- Eyes - amber tactical -->
    <rect x="82" y="64" width="14" height="6" rx="1" fill="#1f2937"/>
    <rect x="104" y="64" width="14" height="6" rx="1" fill="#1f2937"/>
    <rect x="84" y="65" width="10" height="4" rx="0.5" fill="#f59e0b" filter="url(#ic_glow)"/>
    <rect x="106" y="65" width="10" height="4" rx="0.5" fill="#f59e0b" filter="url(#ic_glow)"/>
    <!-- Eye center bright -->
    <rect x="88" y="66" width="2" height="2" fill="#fef3c7"/>
    <rect x="110" y="66" width="2" height="2" fill="#fef3c7"/>

    <!-- Chin guard -->
    <path d="M78 74 Q80 90 100 92 Q120 90 122 74 Q112 82 100 84 Q88 82 78 74 Z" fill="#374151"/>
    <path d="M78 74 Q88 82 100 84 Q112 82 122 74" stroke="#6b7280" stroke-width="1" fill="none"/>
    <!-- Chin rivets -->
    <circle cx="84" cy="82" r="1.5" fill="#9ca3af"/>
    <circle cx="116" cy="82" r="1.5" fill="#9ca3af"/>

    <!-- Gold accent stripe on helmet -->
    <rect x="76" y="59" width="48" height="1.5" fill="url(#ic_accent)" opacity="0.7"/>
    <rect x="76" y="73" width="48" height="1.5" fill="url(#ic_accent)" opacity="0.7"/>

    <!-- Name plate -->
    <rect x="28" y="168" width="144" height="22" rx="4" fill="#0a0a0b" opacity="0.9"/>
    <rect x="28" y="168" width="144" height="22" rx="4" fill="none" stroke="#6b7280" stroke-width="1" opacity="0.5"/>
    <text x="100" y="183" font-family="monospace" font-size="11" font-weight="bold" fill="#d1d5db" text-anchor="middle" letter-spacing="1">IRONCLAD</text>
  </g>

  <circle cx="100" cy="100" r="98" fill="none" stroke="#9ca3af" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.3"/>
</svg>
